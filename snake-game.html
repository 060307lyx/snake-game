<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 10px;
            color: white;
            font-size: 1.2em;
            font-weight: bold;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.8em;
            opacity: 0.9;
        }

        .score-value {
            font-size: 1.5em;
            margin-top: 5px;
        }

        #gameCanvas {
            border: 4px solid #667eea;
            border-radius: 10px;
            background: #f0f0f0;
            display: block;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #startBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        #pauseBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        #restartBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
            color: #666;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .instructions p {
            margin: 5px 0;
            line-height: 1.6;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
            text-align: center;
        }

        .game-over h2 {
            color: #f5576c;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.3em;
            margin: 10px 0;
            color: #666;
        }

        .game-over button {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            button {
                padding: 10px 20px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇大作战</h1>
        
        <div class="score-board">
            <div class="score-item">
                <span class="score-label">当前得分</span>
                <span class="score-value" id="score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">最高分</span>
                <span class="score-value" id="highScore">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">等级</span>
                <span class="score-value" id="level">1</span>
            </div>
        <div class="score-item">
                <span class="score-label">长度</span>
                <span class="score-value" id="snakeLength">3</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="500" height="500"></canvas>

        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn" disabled>暂停</button>
            <button id="restartBtn">重新开始</button>
        </div>

        <div class="instructions">
            <h3>📖 游戏说明</h3>
            <p>🎮 使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制蛇的方向</p>
            <p>🍎 吃到食物可以增加得分和蛇的长度</p>
            <p>⚡ 每得10分升一级，速度会加快</p>
            <p>⚠️ 注意不要撞墙或撞到自己！</p>
            <p>💡 按 <strong>空格键</strong> 可以暂停/继续游戏</p>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束！</h2>
        <p>你的得分：<strong id="finalScore">0</strong></p>
        <p>最高分：<strong id="finalHighScore">0</strong></p>
        <button onclick="restartGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const levelElement = document.getElementById('level');
        const snakeLengthElement = document.getElementById('snakeLength');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');

        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let level = 1;
        let gameLoop;
        let gameStarted = false;
        let gamePaused = false;
        let speed = 100;

        highScoreElement.textContent = highScore;

        // 初始化食物位置
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // 确保食物不在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#667eea';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#667eea';
                } else {
                    // 蛇身
                    const gradient = ctx.createLinearGradient(
                        segment.x * gridSize, 
                        segment.y * gridSize,
                        segment.x * gridSize + gridSize,
                        segment.y * gridSize + gridSize
                    );
                    gradient.addColorStop(0, '#764ba2');
                    gradient.addColorStop(1, '#667eea');
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#764ba2';
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    ctx.shadowBlur = 0;
                    
                    // 根据方向绘制眼睛
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    if (dx === 1) { // 右
                        eyeX1 = eyeX2 = segment.x * gridSize + gridSize - 6;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeY2 = segment.y * gridSize + gridSize - 5;
                    } else if (dx === -1) { // 左
                        eyeX1 = eyeX2 = segment.x * gridSize + 6;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeY2 = segment.y * gridSize + gridSize - 5;
                    } else if (dy === -1) { // 上
                        eyeX1 = segment.x * gridSize + 5;
                        eyeX2 = segment.x * gridSize + gridSize - 5;
                        eyeY1 = eyeY2 = segment.y * gridSize + 6;
                    } else if (dy === 1) { // 下
                        eyeX1 = segment.x * gridSize + 5;
                        eyeX2 = segment.x * gridSize + gridSize - 5;
                        eyeY1 = eyeY2 = segment.y * gridSize + gridSize - 6;
                    } else {
                        // 初始状态，朝右
                        eyeX1 = eyeX2 = segment.x * gridSize + gridSize - 6;
                        eyeY1 = segment.y * gridSize + 5;
                        eyeY2 = segment.y * gridSize + gridSize - 5;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eyeX1, eyeY1, 3, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(eyeX2, eyeY2, 3, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            ctx.shadowBlur = 0;

            // 绘制食物
            ctx.fillStyle = '#f5576c';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f5576c';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                2 * Math.PI
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 更新游戏状态
        function update() {
            if (gamePaused || !gameStarted) return;

            // 移动蛇
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 检查是否撞墙
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查是否撞到自己
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                snakeLengthElement.textContent = snake.length;
                
                // 升级
                const newLevel = Math.floor(score / 10) + 1;
                if (newLevel !== level) {
                    level = newLevel;
                    levelElement.textContent = level;
                    speed = Math.max(50, 100 - (level - 1) * 5);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, speed);
                }
                
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        // 游戏主循环
        function gameStep() {
            update();
        }

        // 开始游戏
        function startGame() {
            if (!gameStarted) {
                gameStarted = true;
                dx = 1;
                dy = 0;
                gameLoop = setInterval(gameStep, speed);
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '暂停';
                gamePaused = false;
                draw();
            }
        }

        // 暂停/继续游戏
        function togglePause() {
            if (!gameStarted) return;
            
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? '继续' : '暂停';
        }

        // 重新开始游戏
        function restartGame() {
            clearInterval(gameLoop);
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            level = 1;
            speed = 100;
            gameStarted = false;
            gamePaused = false;
            
            scoreElement.textContent = score;
            levelElement.textContent = level;
            snakeLengthElement.textContent = snake.length;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暂停';
            
            generateFood();
            draw();
            gameOverDiv.style.display = 'none';
        }

        // 游戏结束
        function gameOver() {
            clearInterval(gameLoop);
            gameStarted = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = score;
            finalHighScoreElement.textContent = highScore;
            gameOverDiv.style.display = 'block';
            
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameStarted && e.key !== ' ') return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
                case ' ':
                    e.preventDefault();
                    if (gameStarted) {
                        togglePause();
                    } else {
                        startGame();
                    }
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        // 初始绘制
        generateFood();
        draw();
    </script>
</body>
</html>
